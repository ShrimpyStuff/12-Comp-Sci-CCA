<html>
    <head>
        <title>Shape Optimizer</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <button class="shape_button" href="{{ url_for('shape_bp.create_shape', type='catenoid', r=1, thickness=0.1) }}">Catenoid</a>
        <button class="shape_button" href="{{ url_for('shape_bp.create_shape', type='lattice', r=1, thickness=0.1, density=0.5) }}">Lattice</a>
    </body>
    <script>
        shapeButtons = document.querySelectorAll('.shape_button');
        shapeButtons.forEach(button => {
            button.addEventListener('click', () => {
                fetch(button.getAttribute('href'), { method: 'POST' })
                    .then(response => response.text())
                    .then(data => alert(data))
                    .catch(error => console.error('Error:', error));
            });
        });
    </script>
</html>
